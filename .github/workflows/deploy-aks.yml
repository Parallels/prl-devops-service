name: Deploy to AKS

# DEPLOYMENT STRATEGY:
# - Workaround reason: GitHub Environments are not available on this GitHub plan,
#   so we cannot use environment-based OIDC subjects.
# - Therefore deployments are executed under a trusted branch-ref based OIDC subject.
# - When dispatched from main: both Helm chart AND app image (image_tag) are deployed
# - When dispatched from feature branch: only app image is deployed; chart always comes from main
#   (This is because chart source is determined by the checkout ref, while image_tag is independent input)
# IMPLICATION: Chart changes are only effective when merged to main and re-deployed.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (stg or prd)
        required: true
        type: choice
        options:
          - stg
          - prd
      image_tag:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: false
        default: prl-devops-services
        type: string
      deploy_orchestrator:
        description: Deploy Orchestrator
        required: false
        default: true
        type: boolean
      deploy_catalog:
        description: Deploy Catalog
        required: false
        default: true
        type: boolean
      dry_run:
        description: Run Helm in dry-run mode (no cluster changes)
        required: false
        default: false
        type: boolean
      atomic:
        description: Rollback on failure (atomic deployment)
        required: false
        type: boolean
        default: true

jobs:
  deploy-services:
    name: Deploy Orchestrator and/or Catalog 
    if: ${{ inputs.deploy_orchestrator || inputs.deploy_catalog }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    env:
      AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && secrets.STG_AKS_RESOURCE_GROUP || secrets.PRD_AKS_RESOURCE_GROUP }}
      AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && secrets.STG_AKS_CLUSTER_NAME || secrets.PRD_AKS_CLUSTER_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mask non-secret identifiers
        env:
          OIDC_SUBJECT: repo:${{ github.repository }}:ref:${{ github.ref }}
        run: |
          echo "::add-mask::$OIDC_SUBJECT"
          echo "::add-mask::api://AzureADTokenExchange"
          echo "::add-mask::prl-devops-services"
          echo "::add-mask::prl-devops-orchestrator"
          echo "::add-mask::prl-devops-catalog"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_CLIENT_ID || secrets.PRD_AZURE_CLIENT_ID }}
          tenant-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_TENANT_ID || secrets.PRD_AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_SUBSCRIPTION_ID || secrets.PRD_AZURE_SUBSCRIPTION_ID }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Prepare AKS command helper
        run: |
          cat > "$RUNNER_TEMP/aks-command-helper.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          resource_group="$1"
          cluster_name="$2"
          command="$3"
          shift 3

          invoke_json="$(az aks command invoke \
            -g "$resource_group" \
            -n "$cluster_name" \
            -c "$command" \
            "$@" \
            --only-show-errors \
            -o json)"

          command_id="$(printf '%s' "$invoke_json" | jq -r '.id // .commandId // empty')"
          if [[ -z "$command_id" ]]; then
            echo "Unable to determine AKS command id from invoke response." >&2
            exit 1
          fi

          while true; do
            result_raw="$(az aks command result \
              -g "$resource_group" \
              -n "$cluster_name" \
              -i "$command_id" \
              --only-show-errors \
              -o json 2>&1 || true)"

            if ! printf '%s' "$result_raw" | jq -e . >/dev/null 2>&1; then
              if printf '%s' "$result_raw" | grep -Eq ' is in Running state|status: (Running|Pending|InProgress|Queued)'; then
                echo "AKS command status: Running"
                sleep 10
                continue
              fi
              echo "AKS command status check failed." >&2
              exit 1
            fi

            state="$(printf '%s' "$result_raw" | jq -r '.provisioningState // .status // ""')"
            exit_code="$(printf '%s' "$result_raw" | jq -r 'if .exitCode == null then "" else (.exitCode | tostring) end')"
            output="$(printf '%s' "$result_raw" | jq -r '.logs // .text // .message // ""')"

            if [[ -n "$output" ]]; then
              printf '%s\n' "$output"
            fi

            case "$state" in
              Succeeded)
                [[ -z "$exit_code" || "$exit_code" == "0" ]] && exit 0
                exit "$exit_code"
                ;;
              Failed|Canceled)
                [[ -n "$exit_code" ]] && exit "$exit_code"
                exit 1
                ;;
              *)
                echo "AKS command status: ${state:-Running}"
                sleep 10
                ;;
            esac
          done
          EOF

          chmod +x "$RUNNER_TEMP/aks-command-helper.sh"
          echo "AKS_COMMAND_HELPER=$RUNNER_TEMP/aks-command-helper.sh" >> "$GITHUB_ENV"

      - name: Helm lint orchestrator
        if: ${{ inputs.deploy_orchestrator }}
        run: |
          set -euo pipefail
          cd helm
          "$AKS_COMMAND_HELPER" \
            "$AKS_RESOURCE_GROUP" \
            "$AKS_CLUSTER_NAME" \
            "helm lint . \
              -f ./values-${{ inputs.environment }}.yaml \
              --set config.mode=orchestrator \
              --set fullnameOverride=prl-devops-orchestrator \
              --set image.tag=${{ inputs.image_tag }}" \
            --file .

      - name: Helm deploy orchestrator
        if: ${{ inputs.deploy_orchestrator }}
        env:
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail
          cd helm
          
          HELM_CMD="helm upgrade --install prl-devops-orchestrator . \
            -f ./values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=orchestrator \
            --set fullnameOverride=prl-devops-orchestrator \
            --hide-notes"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          elif [[ "$ATOMIC" == "true" ]]; then
            HELM_CMD="$HELM_CMD --atomic --timeout 5m"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
          fi
          
          "$AKS_COMMAND_HELPER" \
            "$AKS_RESOURCE_GROUP" \
            "$AKS_CLUSTER_NAME" \
            "$HELM_CMD" \
            --file .

      - name: Helm lint catalog
        if: ${{ inputs.deploy_catalog }}
        run: |
          set -euo pipefail
          cd helm
          "$AKS_COMMAND_HELPER" \
            "$AKS_RESOURCE_GROUP" \
            "$AKS_CLUSTER_NAME" \
            "helm lint . \
              -f ./values-${{ inputs.environment }}.yaml \
              --set config.mode=catalog \
              --set fullnameOverride=prl-devops-catalog \
              --set image.tag=${{ inputs.image_tag }}" \
            --file .

      - name: Helm deploy catalog
        if: ${{ inputs.deploy_catalog }}
        env:
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail
          cd helm
          
          HELM_CMD="helm upgrade --install prl-devops-catalog . \
            -f ./values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=catalog \
            --set fullnameOverride=prl-devops-catalog \
            --hide-notes"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          elif [[ "$ATOMIC" == "true" ]]; then
            HELM_CMD="$HELM_CMD --atomic --timeout 5m"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
          fi
          
          "$AKS_COMMAND_HELPER" \
            "$AKS_RESOURCE_GROUP" \
            "$AKS_CLUSTER_NAME" \
            "$HELM_CMD" \
            --file .