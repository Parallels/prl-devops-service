name: Deploy to AKS

# DEPLOYMENT STRATEGY:
# - Workaround reason: GitHub Environments are not available on this GitHub plan,
#   so we cannot use environment-based OIDC subjects.
# - Therefore deployments are executed under the trusted main ref subject
#   (repo:Parallels/prl-devops-service:ref:refs/heads/main).
# - When dispatched from main: both Helm chart AND app image (image_tag) are deployed
# - When dispatched from feature branch: only app image is deployed; chart always comes from main
#   (This is because chart source is determined by the checkout ref, while image_tag is independent input)
# IMPLICATION: Chart changes are only effective when merged to main and re-deployed.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (stg or prd)
        required: true
        type: choice
        options:
          - stg
          - prd
      image_tag:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: false
        default: prl-devops-services
        type: string
      deploy_orchestrator:
        description: Deploy Orchestrator
        required: false
        default: true
        type: boolean
      deploy_catalog:
        description: Deploy Catalog
        required: false
        default: true
        type: boolean
      dry_run:
        description: Run Helm in dry-run mode (no cluster changes)
        required: false
        default: false
        type: boolean
      atomic:
        description: Rollback on failure (atomic deployment)
        required: false
        type: boolean
        default: false

jobs:
  deploy-orchestrator:
    name: Deploy Orchestrator
    if: ${{ inputs.deploy_orchestrator }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_CLIENT_ID || secrets.PRD_AZURE_CLIENT_ID }}
          tenant-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_TENANT_ID || secrets.PRD_AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_SUBSCRIPTION_ID || secrets.PRD_AZURE_SUBSCRIPTION_ID }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Check internal connectivity (via netcat)
        run: |
          echo "Testing TCP connectivity to private endpoint..."
          ENDPOINT="di-aks-plt-stg-we-2ietnykd.privatelink.westeurope.azmk8s.io"
          if command -v nc &> /dev/null; then
            nc -vz "$ENDPOINT" 443 || echo "Netcat test failed"
          else
            echo "Netcat not available"
          fi

      - name: Check internal connectivity (via bash)
        run: |
          echo "Testing TCP connectivity via bash..."
          ENDPOINT="di-aks-plt-stg-we-2ietnykd.privatelink.westeurope.azmk8s.io"
          timeout 5 bash -c "</dev/tcp/$ENDPOINT/443" 2>&1 && echo "Bash TCP test successful!" || echo "Bash TCP test failed"

      - name: Test TLS connectivity to private endpoint
        run: |
          echo "Testing direct TLS to private endpoint..."
          PRIVATE_ENDPOINT="di-aks-plt-stg-we-2ietnykd.privatelink.westeurope.azmk8s.io"
          curl -vv https://${PRIVATE_ENDPOINT}:443/version 2>&1 | head -50 || echo "TLS connection failed (expected with proxy)"

      - name: Helm lint orchestrator
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "helm lint ./helm \
              -f ./helm/values-${{ inputs.environment }}.yaml \
              --set config.mode=orchestrator \
              --set fullnameOverride=prl-devops-orchestrator \
              --set image.tag=${{ inputs.image_tag }}"

      - name: Helm deploy orchestrator
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail
          
          HELM_CMD="helm upgrade --install prl-devops-orchestrator ./helm \
            -f ./helm/values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=orchestrator \
            --set fullnameOverride=prl-devops-orchestrator"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
            if [[ "$ATOMIC" == "true" ]]; then
              HELM_CMD="$HELM_CMD --atomic"
            fi
          fi
          
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "$HELM_CMD"

  deploy-catalog:
    name: Deploy Catalog
    if: ${{ inputs.deploy_catalog }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_CLIENT_ID || secrets.PRD_AZURE_CLIENT_ID }}
          tenant-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_TENANT_ID || secrets.PRD_AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_SUBSCRIPTION_ID || secrets.PRD_AZURE_SUBSCRIPTION_ID }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint catalog
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "helm lint ./helm \
              -f ./helm/values-${{ inputs.environment }}.yaml \
              --set config.mode=catalog \
              --set fullnameOverride=prl-devops-catalog \
              --set image.tag=${{ inputs.image_tag }}"

      - name: Helm deploy catalog
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail
          
          HELM_CMD="helm upgrade --install prl-devops-catalog ./helm \
            -f ./helm/values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=catalog \
            --set fullnameOverride=prl-devops-catalog"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
            if [[ "$ATOMIC" == "true" ]]; then
              HELM_CMD="$HELM_CMD --atomic"
            fi
          fi
          
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "$HELM_CMD"