name: Deploy to AKS

# DEPLOYMENT STRATEGY:
# - Workaround reason: GitHub Environments are not available on this GitHub plan,
#   so we cannot use environment-based OIDC subjects.
# - Therefore deployments are executed under a trusted branch-ref based OIDC subject.
# - When dispatched from main: both Helm chart AND app image (image_tag) are deployed
# - When dispatched from feature branch: only app image is deployed; chart always comes from main
#   (This is because chart source is determined by the checkout ref, while image_tag is independent input)
# IMPLICATION: Chart changes are only effective when merged to main and re-deployed.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (stg or prd)
        required: true
        type: choice
        options:
          - stg
          - prd
      image_tag:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: false
        default: prl-devops-services
        type: string
      deploy_orchestrator:
        description: Deploy Orchestrator
        required: false
        default: true
        type: boolean
      deploy_catalog:
        description: Deploy Catalog
        required: false
        default: true
        type: boolean
      dry_run:
        description: Run Helm in dry-run mode (no cluster changes)
        required: false
        default: false
        type: boolean
      atomic:
        description: Rollback on failure (atomic deployment)
        required: false
        type: boolean
        default: true

jobs:
  deploy-services:
    name: Deploy Orchestrator and/or Catalog 
    if: ${{ inputs.deploy_orchestrator || inputs.deploy_catalog }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    env:
      AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && secrets.STG_AKS_RESOURCE_GROUP || secrets.PRD_AKS_RESOURCE_GROUP }}
      AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && secrets.STG_AKS_CLUSTER_NAME || secrets.PRD_AKS_CLUSTER_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mask runtime identifiers
        run: |
          oidc_subject="repo:${GITHUB_REPOSITORY}:ref:${GITHUB_REF}"
          echo "::add-mask::$oidc_subject"
          echo "::add-mask::api://AzureADTokenExchange"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_CLIENT_ID || secrets.PRD_AZURE_CLIENT_ID }}
          tenant-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_TENANT_ID || secrets.PRD_AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_SUBSCRIPTION_ID || secrets.PRD_AZURE_SUBSCRIPTION_ID }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Network checks to AKS private API
        run: |
          set -euo pipefail

          runner_source_ip="$(ip -4 route get 1.1.1.1 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="src"){print $(i+1); exit}}')"
          if [[ -n "$runner_source_ip" ]]; then
            echo "Runner local source IP: $runner_source_ip"
          else
            echo "Runner local source IP could not be determined"
          fi

          AKS_API_FQDN="$(az aks show \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --query privateFqdn \
            -o tsv)"

          if [[ -z "$AKS_API_FQDN" || "$AKS_API_FQDN" == "null" ]]; then
            echo "Unable to read privateFqdn from AKS metadata" >&2
            exit 1
          fi

          echo "AKS private API FQDN: $AKS_API_FQDN"

          echo "DNS lookup via getent"
          getent hosts "$AKS_API_FQDN" || true

          if command -v nslookup >/dev/null 2>&1; then
            echo "DNS lookup via nslookup"
            nslookup "$AKS_API_FQDN" || true
          fi

          AKS_API_IP="$(getent ahostsv4 "$AKS_API_FQDN" | awk 'NR==1{print $1}')"
          if [[ -z "$AKS_API_IP" ]]; then
            echo "Failed to resolve AKS private API IP for $AKS_API_FQDN" >&2
            exit 1
          fi

          echo "AKS private API resolved IP: $AKS_API_IP"

          echo "TCP check to FQDN:443"
          timeout 15 bash -c "exec 3<>/dev/tcp/$AKS_API_FQDN/443"

          echo "TCP check to resolved IP:443"
          timeout 15 bash -c "exec 3<>/dev/tcp/$AKS_API_IP/443"

      - name: Install kubelogin
        run: |
          set -euo pipefail
          KUBELOGIN_VERSION="v0.2.14"
          # Skip download if already installed at correct version
          if kubelogin --version 2>/dev/null | grep -q "$KUBELOGIN_VERSION"; then
            echo "kubelogin $KUBELOGIN_VERSION already installed"
            exit 0
          fi
          curl -sSL "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip" -o /tmp/kubelogin.zip
          # Use python3 zipfile instead of unzip: runner has no unzip and no passwordless sudo to install it
          python3 -m zipfile -e /tmp/kubelogin.zip /tmp/kubelogin
          chmod +x /tmp/kubelogin/bin/linux_amd64/kubelogin
          mkdir -p "$HOME/.local/bin"
          cp /tmp/kubelogin/bin/linux_amd64/kubelogin "$HOME/.local/bin/kubelogin"
          rm -rf /tmp/kubelogin /tmp/kubelogin.zip

      - name: Get AKS credentials
        run: |
          set -euo pipefail
          az aks get-credentials \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Convert kubeconfig for kubelogin
        run: |
          set -euo pipefail
          kubelogin convert-kubeconfig -l azurecli

      - name: Validate Kubernetes API connectivity
        run: |
          set -euo pipefail
          kubectl version --short
          kubectl cluster-info

      - name: Helm lint orchestrator
        if: ${{ inputs.deploy_orchestrator }}
        run: |
          set -euo pipefail
          helm lint helm \
            -f helm/values-${{ inputs.environment }}.yaml \
            --set config.mode=orchestrator \
            --set fullnameOverride=prl-devops-orchestrator \
            --set image.tag=${{ inputs.image_tag }}

      - name: Helm deploy orchestrator
        if: ${{ inputs.deploy_orchestrator }}
        env:
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail
          
          HELM_CMD="helm upgrade --install prl-devops-orchestrator helm \
            -f helm/values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=orchestrator \
            --set fullnameOverride=prl-devops-orchestrator \
            --hide-notes"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          elif [[ "$ATOMIC" == "true" ]]; then
            HELM_CMD="$HELM_CMD --atomic --timeout 5m"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
          fi

          $HELM_CMD

      - name: Helm lint catalog
        if: ${{ inputs.deploy_catalog }}
        run: |
          set -euo pipefail
          helm lint helm \
            -f helm/values-${{ inputs.environment }}.yaml \
            --set config.mode=catalog \
            --set fullnameOverride=prl-devops-catalog \
            --set image.tag=${{ inputs.image_tag }}

      - name: Helm deploy catalog
        if: ${{ inputs.deploy_catalog }}
        env:
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail

          HELM_CMD="helm upgrade --install prl-devops-catalog helm \
            -f helm/values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=catalog \
            --set fullnameOverride=prl-devops-catalog \
            --hide-notes"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          elif [[ "$ATOMIC" == "true" ]]; then
            HELM_CMD="$HELM_CMD --atomic --timeout 5m"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
          fi

          $HELM_CMD