name: Deploy to AKS

# DEPLOYMENT STRATEGY:
# - Workaround reason: GitHub Environments are not available on this GitHub plan,
#   so we cannot use environment-based OIDC subjects.
# - Therefore deployments are executed under the trusted main ref subject
#   (repo:Parallels/prl-devops-service:ref:refs/heads/main).
# - When dispatched from main: both Helm chart AND app image (image_tag) are deployed
# - When dispatched from feature branch: only app image is deployed; chart always comes from main
#   (This is because chart source is determined by the checkout ref, while image_tag is independent input)
# IMPLICATION: Chart changes are only effective when merged to main and re-deployed.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment (stg or prd)
        required: true
        type: choice
        options:
          - stg
          - prd
      image_tag:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: false
        default: prl-devops-services
        type: string
      deploy_orchestrator:
        description: Deploy Orchestrator
        required: false
        default: true
        type: boolean
      deploy_catalog:
        description: Deploy Catalog
        required: false
        default: true
        type: boolean
      dry_run:
        description: Run Helm in dry-run mode (no cluster changes)
        required: false
        default: false
        type: boolean
      atomic:
        description: Rollback on failure (atomic deployment)
        required: false
        type: boolean
        default: false

jobs:
  deploy-services:
    name: Deploy Orchestrator and/or Catalog 
    if: ${{ inputs.deploy_orchestrator || inputs.deploy_catalog }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_CLIENT_ID || secrets.PRD_AZURE_CLIENT_ID }}
          tenant-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_TENANT_ID || secrets.PRD_AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.environment == 'stg' && secrets.STG_AZURE_SUBSCRIPTION_ID || secrets.PRD_AZURE_SUBSCRIPTION_ID }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Mask infra names
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
        run: |
          echo "::add-mask::$AKS_RESOURCE_GROUP"
          echo "::add-mask::$AKS_CLUSTER_NAME"

      - name: Helm lint orchestrator
        if: ${{ inputs.deploy_orchestrator }}
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          cd helm
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "helm lint . \
              -f ./values-${{ inputs.environment }}.yaml \
              --set config.mode=orchestrator \
              --set fullnameOverride=prl-devops-orchestrator \
              --set image.tag=${{ inputs.image_tag }}"

      - name: Helm deploy orchestrator
        if: ${{ inputs.deploy_orchestrator }}
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail
          cd helm
          
          HELM_CMD="helm upgrade --install prl-devops-orchestrator . \
            -f ./values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=orchestrator \
            --set fullnameOverride=prl-devops-orchestrator"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          elif [[ "$ATOMIC" == "true" ]]; then
            HELM_CMD="$HELM_CMD --atomic --timeout 5m"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
          fi
          
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "$HELM_CMD"

      - name: Helm lint catalog
        if: ${{ inputs.deploy_catalog }}
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          cd helm
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "helm lint . \
              -f ./values-${{ inputs.environment }}.yaml \
              --set config.mode=catalog \
              --set fullnameOverride=prl-devops-catalog \
              --set image.tag=${{ inputs.image_tag }}"

      - name: Helm deploy catalog
        if: ${{ inputs.deploy_catalog }}
        env:
          AKS_RESOURCE_GROUP: ${{ inputs.environment == 'stg' && vars.STG_AKS_RESOURCE_GROUP || vars.PRD_AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ inputs.environment == 'stg' && vars.STG_AKS_CLUSTER_NAME || vars.PRD_AKS_CLUSTER_NAME }}
          K8S_NAMESPACE: ${{ inputs.namespace }}
          DRY_RUN: ${{ inputs.dry_run }}
          ATOMIC: ${{ inputs.atomic }}
        run: |
          set -euo pipefail
          cd helm
          
          HELM_CMD="helm upgrade --install prl-devops-catalog . \
            -f ./values-${{ inputs.environment }}.yaml \
            --namespace $K8S_NAMESPACE \
            --set image.tag=${{ inputs.image_tag }} \
            --set config.mode=catalog \
            --set fullnameOverride=prl-devops-catalog"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            HELM_CMD="$HELM_CMD --dry-run --debug"
          elif [[ "$ATOMIC" == "true" ]]; then
            HELM_CMD="$HELM_CMD --atomic --timeout 5m"
          else
            HELM_CMD="$HELM_CMD --wait --timeout 5m"
          fi
          
          az aks command invoke \
            -g "$AKS_RESOURCE_GROUP" \
            -n "$AKS_CLUSTER_NAME" \
            --file . \
            -c "$HELM_CMD"