name: Deploy to DI AKS

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment (stg or prd)
        required: true
        type: string
      image_tag:
        description: Docker image tag to deploy
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: false
        default: prl-devops-services
        type: string
      deploy_orchestrator:
        description: Deploy Orchestrator
        required: false
        default: true
        type: boolean
      deploy_catalog:
        description: Deploy Catalog
        required: false
        default: true
        type: boolean

jobs:
  deploy-orchestrator:
    name: Deploy Orchestrator (${{ inputs.environment }})
    if: ${{ inputs.deploy_orchestrator }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm deploy orchestrator
        env:
          K8S_NAMESPACE: ${{ inputs.namespace }}
        run: |
          set -euo pipefail
          helm upgrade --install prl-devops-orchestrator ./helm-di \
            -f ./helm-di/values-${{ inputs.environment }}.yaml \
            --namespace "$K8S_NAMESPACE" \
            --set image.tag="${{ inputs.image_tag }}" \
            --set config.mode=orchestrator \
            --set fullnameOverride=prl-devops-orchestrator \
            --wait --timeout 5m

  deploy-catalog:
    name: Deploy Catalog (${{ inputs.environment }})
    if: ${{ inputs.deploy_catalog }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm deploy catalog
        env:
          K8S_NAMESPACE: ${{ inputs.namespace }}
        run: |
          set -euo pipefail
          helm upgrade --install prl-devops-catalog ./helm-di \
            -f ./helm-di/values-${{ inputs.environment }}.yaml \
            --namespace "$K8S_NAMESPACE" \
            --set image.tag="${{ inputs.image_tag }}" \
            --set config.mode=catalog \
            --set fullnameOverride=prl-devops-catalog \
            --wait --timeout 5m
