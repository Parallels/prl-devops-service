version: '3.9'
name: devops-service
services:
  devops:
    image: ghcr.io/parallels/prl-devops-service:latest
    ports:
      - "5001:80/tcp"
    volumes:
      - devops-data:/etc/parallels-devops
    environment:
      HMAC_SECRET: ''
      LOG_LEVEL: 'info'
      SECURITY_PRIVATE_KEY: ''
      TLS_ENABLED: 'false'
      TLS_PORT: '8447'
      TLS_CERTIFICATE: ''
      TLS_PRIVATE_KEY: ''
      API_PORT: '80'
      DATABASE_FOLDER: '/etc/parallels-devops'
      API_PREFIX: '/api'
      ROOT_PASSWORD: ''
      DISABLE_CATALOG_CACHING: 'false'
      TOKEN_DURATION_MINUTES: 60
      ENABLED_MODULES: host,orchestrator,catalog,cors,reverse_proxy
      USE_ORCHESTRATOR_RESOURCES: 'false'
      ENABLE_CORS: 'true'
      CORS_ALLOWED_ORIGINS: '*'
      CORS_ALLOWED_METHODS: 'GET,POST,PUT,DELETE,PATCH'
      CORS_ALLOWED_HEADERS: 'X-Requested-With,Accept,Authorization,Content-Type,Content-Length,Accept-Encoding,X-CSRF-Token,Origin,Access-Control-Request-Method,Access-Control-Request-Headers,x-source-id,X-Source-Id'

volumes:
  devops-data:
