version: "2"
run:
  concurrency: 8
  issues-exit-code: 1
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - errcheck
    - funlen
    - gocognit
    - goconst
    - gocritic
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nestif
    - revive
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
    gocognit:
      min-complexity: 30
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      enabled-checks:
        - appendCombine
        - badCall
        - badCond
        - boolExprSimplify
        - codegenComment
        - commentFormatting
        - commentedOutCode
        - deprecatedComment
        - dupImport
        - emptyFallthrough
        - emptyStringTest
        - equalFold
        - evalOrder
        - exitAfterDefer
        - flagName
        - hexLiteral
        - indexAlloc
        - initClause
        - methodExprCall
        - nestingReduce
        - newDeref
        - nilValReturn
        - offBy1
        - ptrToRefParam
        - rangeExprCopy
        - regexpPattern
        - sloppyReassign
        - stringXbytes
        - truncateCmp
        - typeAssertChain
        - typeUnparen
        - underef
        - unnecessaryBlock
        - valSwap
        - weakCond
        - wrapperFunc
        - yodaStyleExpr
    gocyclo:
      min-complexity: 10
    nestif:
      min-complexity: 8
    revive:
      rules:
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - goconst
          - gosec
        path: .*_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
