# TODO: This chart was added for initial testing and simplicity.
# Use ../helm as the canonical chart. This directory will be removed.
#
# Default values for prl-devops-service DI AKS deployment.
# Override per-environment via values-stg.yaml / values-prd.yaml.
# Secrets are NEVER stored here — injected at deploy time via envFrom.

replicaCount: 1

image:
  repository: ghcr.io/parallels/prl-devops-service
  pullPolicy: Always
  tag: "latest"

fullnameOverride: ""
namespace: prl-devops-services

serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Application config (maps to docker-compose environment) ---
config:
  # Overridden per-release: "orchestrator" or "catalog"
  mode: api
  apiPort: "80"
  apiPrefix: /api
  logLevel: info
  # Keep empty to derive from mode automatically:
  # catalog -> api,catalog, otherwise -> api,orchestrator
  enabledModules: ""
  enableCors: "true"
  corsAllowedOrigins: "*"
  corsAllowedMethods: "GET,POST,PUT,DELETE,PATCH"
  corsAllowedHeaders: "X-Requested-With,Accept,Authorization,Content-Type,Content-Length,Accept-Encoding,X-CSRF-Token,Origin,Access-Control-Request-Method,Access-Control-Request-Headers,x-source-id,X-Source-Id"
  tlsEnabled: "false"
  disableCatalogCaching: "false"
  useOrchestratorResources: "false"
  tokenDurationMinutes: "60"
  # Fast testing hook for additional env vars without template changes.
  # Example: extraEnv: { FEATURE_FLAG_X: "true" }
  extraEnv: {}

# Runtime secrets are provided by SecretProviderClass in infra repo (CSI driver).
# The CSI volume mount triggers Key Vault sync → K8s Secret → consumed via envFrom.
# Secret follows pod lifecycle (deleted when pod is removed).
envFrom:
  - secretRef:
      name: prl-devops-service-runtime-secrets

# CSI SecretProviderClass reference. The actual SecretProviderClass is managed
# in the private DI-azure-infra-k8s repo to avoid exposing Azure metadata.
# Leave empty for local dev (no CSI driver).
secretProviderClass:
  name: ""
  mountPath: "/mnt/secrets"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
