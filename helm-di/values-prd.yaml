# Production overrides for DI AKS.
# Secrets are fetched from Azure Key Vault via Secrets Store CSI Driver.

replicaCount: 2

image:
  repository: ghcr.io/parallels/prl-devops-service
  pullPolicy: Always
  tag: "latest"

namespace: prl-devops-services

serviceAccount:
  create: false  # Service account created by external-secrets chart
  name: "prl-devops-secrets"

config:
  mode: api          # CI overrides: orchestrator | catalog
  apiPort: "80"
  apiPrefix: /api
  logLevel: DEBUG
  # Keep empty so helm-di/templates/configmap.yaml derives ENABLED_MODULES from config.mode.
  # catalog -> api,catalog, otherwise -> api,orchestrator
  enabledModules: ""
  enableCors: "true"
  corsAllowedOrigins: "*"
  corsAllowedMethods: "GET,POST,PUT,DELETE,PATCH"
  corsAllowedHeaders: "X-Requested-With,Accept,Authorization,Content-Type,Content-Length,Accept-Encoding,X-CSRF-Token,Origin,Access-Control-Request-Method,Access-Control-Request-Headers,x-source-id,X-Source-Id"
  tlsEnabled: "false"
  disableCatalogCaching: "false"
  useOrchestratorResources: "false"
  tokenDurationMinutes: "60"
  extraEnv: {}

envFrom:
  - secretRef:
      name: prl-devops-service-runtime-secrets

# CSI SecretProviderClass reference created by infra chart (private repo).
secretProviderClass:
  name: "prl-devops-secrets"
  mountPath: "/mnt/secrets"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
