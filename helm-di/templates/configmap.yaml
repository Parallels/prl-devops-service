apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prl.fullname" . }}
  namespace: {{ include "prl.namespace" . }}
  labels:
    {{- include "prl.labels" . | nindent 4 }}
data:
  MODE: {{ .Values.config.mode | quote }}
  API_PORT: {{ .Values.config.apiPort | quote }}
  API_PREFIX: {{ .Values.config.apiPrefix | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  TLS_ENABLED: {{ .Values.config.tlsEnabled | quote }}
  DISABLE_CATALOG_CACHING: {{ .Values.config.disableCatalogCaching | quote }}
  USE_ORCHESTRATOR_RESOURCES: {{ .Values.config.useOrchestratorResources | quote }}
  TOKEN_DURATION_MINUTES: {{ .Values.config.tokenDurationMinutes | quote }}
