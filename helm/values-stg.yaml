# Staging overrides for the full prl-devops-service Helm chart.
# This file targets templates under ./helm rather than the simplified ./helm-di chart.

replicaCount: 1

image:
  repository: ghcr.io/parallels/prl-devops-service
  pullPolicy: Always
  tag: "latest"

namespace: prl-devops-services

serviceAccount:
  create: false
  automount: true
  name: prl-devops-secrets

envFrom:
  - secretRef:
      name: prl-devops-service-runtime-secrets

# CSI SecretProviderClass is created by infra and mounted here to trigger
# Key Vault -> Kubernetes Secret sync for envFrom runtime secrets.
# Keeping creation in infra keeps this app chart backend-agnostic.
secretProviderClass:
  name: prl-devops-secrets
  mountPath: /mnt/secrets

storage:
  node_name: ""
  storage_class: managed-csi
  storage_size: 1Gi
  access_mode: ReadWriteOnce
  databasePath: /go/bin/db
  autoRecover: true

security:
  jwt:
    rsa_private_key: ""
    hmac_secret: ""
    duration: "60m"
    signing_method: HS256
  password:
    min_password_length: 12
    max_password_length: 40
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_number: true
    require_special_characters: true
    salt_password: true
  brute_force:
    max_login_attempts: 5
    lockout_duration: 10s
    increment_lockout_duration: true
  encryption_private_key: ""
  root_password: ""
  enable_tls: false
  disable_tls_validation: false

service:
  type: ClusterIP
  port: 80
  targetPort: 80

logLevel: DEBUG

config:
  mode: api
  apiPort: "80"
  apiPrefix: /api
  logLevel: DEBUG
  # Keep empty to derive from mode in template:
  # catalog -> api,catalog, otherwise -> api,orchestrator
  enabledModules: ""
  enableCors: "true"
  corsAllowedOrigins: "*"
  corsAllowedMethods: "GET,POST,PUT,DELETE,PATCH"
  corsAllowedHeaders: "X-Requested-With,Accept,Authorization,Content-Type,Content-Length,Accept-Encoding,X-CSRF-Token,Origin,Access-Control-Request-Method,Access-Control-Request-Headers,x-source-id,X-Source-Id"
  tlsEnabled: "false"
  disableCatalogCaching: false
  useOrchestratorResources: "false"
  tokenDurationMinutes: "60"
  extraEnv: {}

logs:
  toFile: false
  folder: ""

ingress:
  enabled: false
  istio:
    enabled: false
    gateway: ""
    create_gateway: false
  nginx:
    enabled: false
    ingressClassName: nginx
  prefix: parallels
  annotations: {}
  host: ""
  apiPort: 80
  apiPrefix: /api
  tls:
    enabled: false
    port: 443
    tls_secret_name: ""
    caCertificate: ""
    certificate: ""
    privateKey: ""

# Compatibility shim for the current deployment template, which checks
# .Values.apiPrefix instead of .Values.ingress.apiPrefix for one env var.
apiPrefix: /api

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations:
  - key: kubernetes.parallels.com/workload
    operator: Equal
    value: public
    effect: NoSchedule

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.parallels.com/workload
              operator: In
              values:
                - public