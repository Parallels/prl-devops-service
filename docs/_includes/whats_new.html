{% assign release_count = 0 %}
{% for post in site.posts %}
{% if post.categories contains "Changelog" %}
{% if release_count < 3 %}
<div class="release-card">
  <div class="release-card-inner">
    <div class="release-card-header">
      <span class="release-version">{{ post.title }}</span>
      <span class="release-date">{{ post.date | date: "%B %d, %Y" }}</span>
    </div>
    <div class="release-card-body">
      {{ post.content }}
    </div>
  </div>
</div>
{% assign release_count = release_count | plus: 1 %}
{% endif %}
{% endif %}
{% endfor %}
      </ul>
    </div>
  </div>
</div>
