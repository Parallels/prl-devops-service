main_image: "pipeline-architecture.png"
title: "CI/CD Pipeline Flow"
show_background_effect: false
items:
  - id: trigger
    type: step
    title: "Pipeline Trigger"
    description: "The pipeline starts on a <strong>git push</strong> to the main branch, or manually via the CI/CD dashboard. Webhooks provide instant notification."
    hotspot:
      x: 15
      y: 20
      radius: 25

  - id: build-stage
    type: step
    title: "Build Stage"
    description: "The runner pulls your code, installs dependencies, and builds the Docker image. Artifacts are tagged with the Git commit SHA for traceability."
    hotspot:
      x: 35
      y: 20
      radius: 30

  - id: test-stage
    type: step
    title: "Test Stage"
    description: "Run unit tests, integration tests, and linting in isolated containers. Failures here block the pipeline from progressing to deployment."
    hotspot:
      x: 55
      y: 20
      radius: 30

  - id: deploy-stage
    type: step
    title: "Deploy Stage"
    description: "Push the verified image to your container registry and deploy to the target VM. The deployment script handles rolling updates with zero downtime."
    hotspot:
      x: 75
      y: 20
      radius: 30

  - id: health-check
    type: step
    title: "Health Check & Verification"
    description: "Run endpoint health checks against the deployed service. If the application responds within the timeout, the pipeline marks itself as successful."
    hotspot:
      x: 90
      y: 20
      radius: 28

  - id: notify
    type: scene
    title: "Notifications & Artifacts"
    description: "Upon success or failure, the pipeline sends notifications via Slack, email, or webhook. Build artifacts are archived for rollback."
    hotspot:
      x: 50
      y: 60
      radius: 35
    image: "notifications-panel.png"
    steps:
      - id: slack-notify
        type: step
        title: "Slack Integration"
        description: "Configure a Slack webhook channel to receive real-time pipeline status updates. Include build duration and author info."
        hotspot:
          x: 30
          y: 30
          radius: 25
          color: "#8B5CF6"

      - id: artifact-store
        type: step
        title: "Artifact Storage"
        description: "Build artifacts (Docker images, test reports) are stored in a versioned registry. Enables quick rollback to any previous deployment."
        hotspot:
          x: 70
          y: 50
          radius: 28
          color: "#EC4899"

      - id: rollback
        type: step
        title: "Rollback Capability"
        description: "If a deployment causes issues, trigger a one-click rollback to the previous known-good image tag. Rollbacks preserve the full audit trail."
        hotspot:
          x: 50
          y: 80
          radius: 30
          color: "#EF4444"
