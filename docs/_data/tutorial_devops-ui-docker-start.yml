id: tutorial-devops-ui-docker-start
title: Run the DevOps UI in Docker
level: beginner
duration: "~5 min"
group: Tutorials
category: DevOps
order: 2
hidden: false

tags:
  - devops
  - ui
  - docker
  - containers

depends_on:
  - tutorial-devops-cli-quickstart

scenario: >
  Learn how to deploy the Parallels DevOps UI as a Docker container and
  connect it to your local backend service.

introduction:
  image: /assets/img/devops-ui-home.png
  markdown_scenario: >
    While the `prldevops` CLI and REST API are powerful on their own, the 
    **Parallels DevOps UI** provides a unified visual dashboard for managing 
    your host fleet, configuring virtual machines, and browsing your Catalog. 
    In this use case, you will pull the official Docker image, run the UI 
    container, and securely link it to the backend service you configured 
    in the previous step.
  key_outcomes:
    - Pull the Parallels DevOps UI Docker image
    - Start the UI container with the correct port mappings
    - Link the container to your existing local API
    - Access the visual dashboard from your browser
  prerequisites:
    hard:
      - Docker Desktop or Docker Engine installed and running
      - Parallels DevOps Service actively running on `http://localhost:80`
    soft:
      - Basic understanding of Docker commands
      - Completion of the **DevOps CLI Quick Start** use case
  unlocks:
    - orchestrator-use-case
    - catalog-use-case

steps:
  - id: intro
    kind: markdown
    title: Add a Visual Dashboard to your Fleet
    duration: "~1 min"
    body: |
      ## A single pane of glass

      The `prldevops` backend you set up previously does the heavy lifting, but 
      sometimes a visual interface makes managing multiple nodes and images significantly 
      easier. The official frontend is distributed as a lightweight, pre-compiled Docker 
      image that connects directly to your backend's REST API.

      | Feature | Benefit |
      |---|---|
      | <i class="fa-brands fa-docker"></i> **Containerized** | Zero build steps and no Node.js dependencies required on your host. |
      | <i class="fa-solid fa-plug"></i> **Bring Your Own API** | Connects dynamically to your existing `localhost` API or a remote cluster. |
      | <i class="fa-solid fa-chart-line"></i> **Real-time Insights** | View live metrics, logs, and state changes across your entire fleet. |

      **In this use case**, we will download the image, start the container, and 
      point it to the API listening on port `5001`. we will also cover a few UI screenshots to help you get familiar with the layout and features.

  - id: verify-docker
    kind: narrative
    title: Verify Docker is Running
    duration: "~1 min"
    markdown_body: |
      Before we can pull and run the UI, we need to ensure the Docker daemon is 
      active on your machine. 
      
      Run the command below to check your Docker version. If this command fails, 
      you might need to start Docker Desktop or the Docker daemon. If you don't 
      have Docker installed yet, follow the official **Get Docker** guide linked 
      below to set it up before proceeding.
    panel:
      kind: terminal
      id: docker-version
      name: Docker Check
      cmd: |
        docker --version
      copy_button: true
    resources:
      - title: "Get Docker"
        url: "https://docs.docker.com/get-docker/"

  - id: setup-directory
    kind: narrative
    title: Download the Compose File
    duration: "~2 min"
    layout: rows
    markdown_body: |
      Let's create a dedicated folder to house our UI configuration, then download the 
      official `docker-compose.yml` file directly from the Parallels repository.
      
      Run the commands below for your operating system to set up the directory and 
      download the file.
    panels:
      - kind: terminal
        id: download-mac-linux
        name: macOS / Linux
        if: platform.os == 'darwin' || platform.os == 'linux'
        cmd: |
          mkdir -p ~/prldevops-ui
          cd ~/prldevops-ui
          curl -O https://raw.githubusercontent.com/Parallels/prl-devops-ui/refs/heads/main/docker-compose.yml
        copy_button: true
      - kind: terminal
        id: download-windows
        name: Windows
        if: platform.os == 'windows'
        cmd: |
          mkdir prldevops-ui
          cd prldevops-ui
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Parallels/prl-devops-ui/refs/heads/main/docker-compose.yml" -OutFile "docker-compose.yml"
        copy_button: true

  - id: configure-env
    kind: code_editor
    title: Configure Environment Variables
    duration: "~2 min"
    markdown_body: |
      The Docker Compose setup relies on an environment file to know where your backend 
      service is located. 

      In the same `prldevops-ui` folder you just created, create a file named `.env` and 
      paste the configuration below. This ensures the frontend correctly targets the API 
      you started on port `5001` during the previous use case.

      Download the `.env` file with the button below or create it manually with the provided content.
    files:
      - name: .env
        language: env
        initial_code: |
          # The URL where your prldevops backend API is running, 
          # don't forget the port if it's not the default 5001
          VITE_DEFAULT_HOST_URL=http://localhost:5001
          VITE_DEFAULT_HOST_NAME=Local Parallels DevOps

  - id: start-compose
    kind: narrative
    title: Start the UI Container
    duration: "~1 min"
    markdown_body: |
      With your `docker-compose.yml` and `.env` files in place, you can now bring up 
      the UI container. 
      
      Make sure your terminal is still inside the `prldevops-ui` directory, then run 
      the command below to download the image and start the service in the background.
    panel:
      kind: terminal
      id: docker-compose-up
      name: Docker Compose
      cmd: |
        docker compose up -d
      copy_button: true
    checklist:
      - The command completes successfully and outputs that the container has "Started".
      - The `prldevops` backend service from the previous guide is still actively running.

  - id: verify-ui
    kind: narrative
    title: Access the Dashboard
    duration: "~1 min"
    markdown_body: |
      With both the backend and frontend services running, your Parallels DevOps 
      stack is complete. 
      
      Open your web browser and navigate to the address below. You should be 
      greeted by the Parallels DevOps login screen or the main dashboard.
    panels:
      - kind: terminal
        id: open-dashboard-mac
        name: Open Dashboard (macOS)
        if: platform.os == 'darwin' || platform.os == 'source'
        cmd: |
          open http://localhost:5780
        copy_button: true
      - kind: terminal
        id: open-dashboard-linux
        name: Open Dashboard (Linux)
        if: platform.os == 'linux'
        cmd: |
          xdg-open http://localhost:5780
        copy_button: true
      - kind: terminal
        id: open-dashboard-windows
        name: Open Dashboard (Windows)
        if: platform.os == 'windows'
        cmd: |
          start http://localhost:5780
        copy_button: true
  - id: ui-login-tour
    kind: narrative
    title: Take a Quick Tour
    duration: "~5 min"
    layout: rows
    markdown_body: >
      Now that you have the dashboard open in your browser, it's time to log in and explore. 

      To authenticate, use the administrative credentials you established during the initial backend configuration. Enter `root` as the username and provide the `ROOT_PASSWORD` you defined in your `config.yaml` file. 

      Click through the interactive walkthrough below for a quick guide on signing in and navigating your new fleet management interface.
    panel:
      kind: walkthrough
      items_ref: ui_login_web
      highlight_ids: ["server_url", "username"]
      auto_advance: false
whats_next:
    title: "Stack Complete"
    markdown_body: >
      You now have the complete Parallels DevOps stack running locally! You can 
      manage your instances directly from the terminal via the CLI, or use the 
      web dashboard for a visual overview of your fleet.
    # recommendations:
    #   - use_case: orchestrator-use-case
    #     icon: fa-network-wired
walkthroughs:
  - id: ui_login_web
    main_image: "/ui/login_web.png"
    title: "Login Interface"
    show_background_effect: false
    items:
      - id: server_url
        type: step
        title: "Server URL"
        description: "This is the URL of your Parallels DevOps Service locally, it will be pre-filled from your .env configuration. If your API is running on a different address or port, update the .env file accordingly and restart the container."
        hotspot:
          x: 50
          y: 40.5
          radius: 25
      - id: username
        type: step
        title: "Username"
        description: "Enter root as the username to log in with admin privileges for your local instance."
        hotspot:
          x: 50
          y: 48.5
          radius: 25
      - id: password
        type: step
        title: "Password"
        description: "Use the password you set during the backend configuration in the previous use case. This is the same password you use for the CLI, as both interfaces connect to the same service."
        hotspot:
          x: 50
          y: 56.5
          radius: 25
      - id: keep_logged_in
        type: step
        title: "Keep Me Logged In"
        description: "Check this option if you want to stay logged in on this device."
        hotspot:
          x: 43
          y: 62.5
          radius: 25